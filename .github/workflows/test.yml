name: Test cage.sh

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'cage.sh'
      - 'tests/**'
      - '.github/workflows/test.yml'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.filter.outputs.should_test }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            should_test:
              - 'cage.sh'
              - 'tests/**'
              - '.github/workflows/test.yml'

  test:
    needs: changes
    if: needs.changes.outputs.should_test == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: bash tests/test_cage.sh

  test-gate:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          result="${{ needs.test.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            exit 0
          fi
          exit 1
