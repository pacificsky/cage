name: Integration tests

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'cage.sh'
      - 'tests/**'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.filter.outputs.should_test }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            should_test:
              - 'cage.sh'
              - 'tests/**'
              - '.github/workflows/integration.yml'

  integration:
    needs: changes
    if: needs.changes.outputs.should_test == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [docker, podman]
    name: integration (${{ matrix.runtime }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Podman
        if: matrix.runtime == 'podman'
        run: |
          # Remove all docker packages so cage.sh falls back to podman.
          sudo apt-get remove -y moby-cli moby-engine docker.io docker-ce-cli docker-ce 2>/dev/null || true
          # Remove any leftover docker binary.
          sudo rm -f "$(command -v docker 2>/dev/null)" || true
          sudo apt-get install -y podman
          # Verify podman works and docker is gone.
          podman --version
          ! command -v docker

      - name: Verify Docker
        if: matrix.runtime == 'docker'
        run: docker --version

      - name: Run integration tests
        run: bash tests/test_integration.sh

  integration-gate:
    needs: integration
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          result="${{ needs.integration.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            exit 0
          fi
          exit 1
